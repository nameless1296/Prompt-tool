<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prompt Generator FIX</title>
<link rel="stylesheet" href="css.css">
</head>

<body>

<h2>🎲 Prompt Generator</h2>

<!-- =========================
     TOP ACTION BAR
========================= -->
<div class="toolbar">

  <button id="genBtn" onclick="gen()">Generate</button>

  <button onclick="copyText()">Copy Prompt</button>

  <!-- PRESET DROPDOWN -->
  <div class="dropdown">
<button id="presetBtn" onclick="toggleDropdown()">
  <span id="presetLabel">Preset: Random</span>
  <span class="arrow">▼</span>
</button>

    <div id="dropdownMenu" class="dropdown-menu hidden">
      <div data-value="random" onclick="setPreset('random')">Random</div>
      <div data-value="cyberpunk" onclick="setPreset('cyberpunk')">Cyberpunk</div>
      <div data-value="gothic" onclick="setPreset('gothic')">Gothic</div>
    </div>
  </div>

  <button id="modeBtn" onclick="toggleMode()">Mode: Simplified</button>

</div>

<!-- =========================
     OUTPUT
========================= -->
<pre id="out" onclick="warnClick()">
Click Generate to start...
</pre>

<!-- =========================
     FEEDBACK
========================= -->
<div id="feedback">Waiting for response...</div>

<!-- =========================
     MODAL
========================= -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div id="modal-text">Message</div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
